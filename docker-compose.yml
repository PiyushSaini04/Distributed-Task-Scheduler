services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskscheduler
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: changeme
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d taskscheduler']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file: .env
    ports:
      - '3000:3000'
      - '9090:9090'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-1:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      WORKER_ID: worker-1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-2:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      WORKER_ID: worker-2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-3:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      WORKER_ID: worker-3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-4:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file: .env
    environment:
      WORKER_ID: worker-4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  reaper:
    build:
      context: .
      dockerfile: docker/reaper.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.50.1
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9091:9090'
    depends_on:
      - api

  grafana:
    image: grafana/grafana:10.3.1
    volumes:
      - ./monitoring/grafana/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    ports:
      - '3001:3000'
    depends_on:
      - prometheus

  dashboard:
    build:
      context: ./frontend
    ports:
      - '5173:80'
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
